<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FakestoreApi</title>
    <link rel="stylesheet" href="../node_modules/bootstrap-icons/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.css">
<script>
function getcategories(){
    fetch("http://fakestoreapi.com/products/categories")
    .then(function(responce){
        return responce.json();
         } )
    .then(function(data){
        data.unshift("all");
      for(var item of data){
          var option = document.createElement("option");
          option.text=item.toUpperCase();
          option.value=item.toUpperCase();
          document.getElementById("lstcategory").appendChild(option);
      }
    })
}
function getproducts(url){ 
    fetch(url)
    .then(function(responce){
        return responce.json();
    })
    .then(function(data){
        for(var item of data){
            var card = document.createElement("div");
            card.className="card m-2 p-2";
            card.style.width="200px";
            card.innerHTML=`
            <img src="${item.image}" height=150;  class="card-img-top">
            <div class="card-header" styles="height:140px;">
                <p>${item.title}</p>
            </div>
            <div class="card-body">
                <dl>
                    <dt>Price</dt>
                    <dd>₹ ${item.price}</dd>
                    <dt>Rating</dt>
                    <dd><span class="bi bi-star-fill"></span>${item.rating.rate}[${item.rating.count}]</dd>
                <dl>     
                    <div class="card-footer">
                        <button class="btn btn-danger w-100">
                            <span class="bi bi-cart3">Add to Cart</span>
                        </button>
                    </div>
            </div> 
            `
            document.getElementById("productContainer").appendChild(card);
        }
    })
}
function bodyload(){
    getcategories();
    getproducts("https://fakestoreapi.com/products");
};
function getcategoryproduct(){
    var categoryname = document.getElementById("lstcategory").value;
    if(categoryname=="all"){
        getproducts("https://fakestoreapi.com/products");

    }else{
        getproducts(`https://fakestoreapi.com/products/${categoryname}`);
    }
 };

   </script>
</head>
    





<body onload="bodyload()" class="container-fluid">
    <header class="bg-danger text-white text-center p-2">
        <h3><span class="bi bi-cart3"></span>Shooping Center</h3>
    </header>
    <div class="row">
        <div class="col-3">
            <h2>Select Category</h2>
            <div>
                <select class="form-select" id="lstcategory" onchange="getcategoryproduct()"></select>
            </div>
        </div>
        <div class="col-9">
            <div class="d-flex flex-wrap" id="productContainer"></div>
        </div>
    </div>
   <script src="../node_modules/jquery/dist/jquery.js"></script>
   <script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.js"></script>    
</body>
</html>
