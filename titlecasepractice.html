<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>titlecase practice</title>
    <script>
        function titlecase(){
            var x = document.getElementById("titlecase").value;
            return x.charAt(0).toUppercase();   
        }
    </script>
</head>
<body>
    <input type="text" onblur="titlecase()" id="titlecase">
    
</body>
</html>
