<!DOCTYPE html>
<html lang="en">
<head>
    <title>Document</title>
    <script>
     function check(){
        var x = document.getElementById("input").value;
         var y = x%100;
        if(y>=20){
            document.write("hello");
        }else{
            document.write("not avalid number");
        }
        
    }; 
    </script>
</head>
<body>
    <input type="text" id="input">
    <button onclick="check()">submit</button>
    
</body>
</html>
