<!DOCTYPE html>
<html lang="en">
<head>
    <title>Array</title>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <script>
   var categories =["Electronics","footware","Fashion","Clothing","Gamming","Computing",
"playing"];
  function bodyload(){
    for(var category of categories){

       var option = document.createElement("option");
       option.text=category;                                                                  //dropdown
       document.querySelector("select").appendChild(option);


       var li = document.createElement("li");
       li.innerHTML=`<input type="checkbox"> ${category}`;                                   //input type
       document.querySelector("ul").appendChild(li);

        var row = document.createElement("tr");                                              //table
        var cell =document.createElement("td");
        cell.innerHTML= category;
        row.appendChild(cell);
        document.querySelector("tbody").appendChild(row);
        
        var li = document.createElement("li");
        li.innerHTML=category;
        document.querySelector("ol").appendChild(li);
    } 
  }
</script>  
<style>
    ul{
        width:200px;
        height: 50px;
        border: 2px solid black;
        overflow: auto;
    }
    table{
        height: 200px;
    }
</style>
</head>
<body onload="bodyload()">
    <ul></ul>  
<div>    <table border="1">
    <thead>
        <tr>
            <th>catagories</th>
        </tr>
    </thead>
    <tbody>

    </tbody>
  </table>
   </div>
   <h3>select catogory</h3>
    <select name="" id="">   
    </select>
    <ol></ol>
</body>
</html>
