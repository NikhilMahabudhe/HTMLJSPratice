<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix Login Page</title>
    <link rel="stylesheet" href="..//node_modules/bootstrap/dist/css/bootstrap.css">
    <style>
       body{
           background-image:url("..//netflix.png");
           background-repeat: no-repeat;
           background-size: cover;  
       }
       #logo{
           margin-top: 20px;
           margin-left: 20px;
       }
       #buttons{
           float: right;
           margin-top: 20px;
           margin-right: 40px;
           padding: 5px;
       }
       #logincontainer{
           justify-content: center;
           align-items: center;
           height: 500px;
           display: flex;
        }
        #loginbutton{
            display: flex;
            justify-content: center;
            align-items: center;
        }
        #bapcontainer{
            background-color: rgb(0, 0, 0, 0.5);
            height: 768px;
        }
    </style>
</head>
<body class="container-fluid">
    <div id="bapcontainer">
        <header>
            <img id="logo" src="..//netflix-logo.png" alt="" height="70px" width="200px">
            <div id="buttons">
                <select class="btn bg bg-dark" name="" id="" style="color:white;">
                    <option value="">Hindi</option>
                    <option value="">English</option>
                </select>
                <span><button class="btn btn-danger">Sign-IN</button></span>
                 
            </div>
        </header>
        <div id="logincontainer">
          <div>
              <div><span style="color: white; font-size: 60px; font-weight: bolder; text-align: center;">Unlimited movies, TV</span></div>
              <div style="color: white; font-size: 60px; font-weight: bolder; text-align: center;">shows and more.</div>
              <div style="color: white; font-size: 30px; font-weight: bolder; text-align: center; margin-bottom: 20px;">Watch anywhere. Cancel anytime.</div>
              <div style="color: white; font-size: 10; font-weight: bold; text-align: center; margin-bottom: 20px;">Ready to watch? Enter your email to create or restart your membership.</div>
              <div id="loginbutton">
                  <input type="text" placeholder="Enter Your Email" name="" id="" style="width: 400px; height: 33px; border: 1px solid black;"> <button class="btn btn-danger" style="margin-left: -6px; height: 33px; width: 100px; border: 1px solid black;"><span>Submit</span></button>
              </div>
         </div>
     
    </div>


    <link rel="stylesheet" href="..//node_modules/bootstrap/dist/css/bootstrap.css">
</body>
</html>
